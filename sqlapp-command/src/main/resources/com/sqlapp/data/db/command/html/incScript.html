<!-- Latest compiled and minified JavaScript -->
<script>
function tableWithColumnFilter(columnFilter) {
    if (!columnFilter || columnFilter.length === 0) {
        return;
    }

    // チェックボックスを配置する場所
    var container = columnFilter.find(".column-filter-content");
    if (container.length === 0) {
        container = columnFilter;
    }

    // 対象テーブル
    var table = columnFilter.nextAll("table").first();
    if (table.length === 0) {
        return;
    }

    var rows = table.find("tr");
    var added = {};

    // 初期非表示にしたい列名
    var defaultHidden = {
        remarks: true,
        displayremarks: true,
        specifics: true,
        statistics: true,
        createdat: true,
        lastalteredat: true
    };

    function toColumnName(text) {
        text = $.trim(text);

        if (text === "#") {
            return "sharp";
        }

        // "(PK)" などを除去
        var pos = text.indexOf("(");
        if (pos >= 0) {
            text = text.substring(0, pos);
        }

        // 空白・改行除去
        return text.replace(/\s+/g, "");
    }

    function addCheckbox(text) {
        text = $.trim(text);

        if (text === "" || added[text]) {
            return;
        }

        added[text] = true;

        var colName = toColumnName(text);
        var checked = !defaultHidden[colName.toLowerCase()];

        var label = $("<label style='margin-right:12px; white-space:nowrap;'></label>");
        var checkbox = $("<input type='checkbox'>")
            .attr("name", colName)
            .prop("checked", checked);

        label.append(checkbox);
        label.append(" " + text);

        container.append(label);
    }

    // 全ヘッダー行から取得
    table.find("thead tr").each(function () {
        $(this).children("th").each(function () {
            addCheckbox($(this).text());
        });
    });

    // 初期状態を反映
    container.find("input[type='checkbox']").each(function () {
        var cb = $(this);
        var colName = cb.attr("name");

        if (!cb.prop("checked")) {
            rows.children("._col_" + colName + "_").hide();
        }
    });

    // イベント登録
    container.on("change", "input[type='checkbox']", function () {
        var cb = $(this);
        var colName = cb.attr("name");

        if (cb.prop("checked")) {
            rows.children("._col_" + colName + "_").show();
        } else {
            rows.children("._col_" + colName + "_").hide();
        }
    });

    // tablesorter 初期化（存在する場合のみ）
    if ($.fn.tablesorter) {
        var sortable = table.data("sortable");
        if (sortable === undefined || sortable) {
            table.tablesorter();
        }
    }
}

// 初期化
$(".columnFilter, .column-filter").each(function () {
    tableWithColumnFilter($(this));
});
</script>
