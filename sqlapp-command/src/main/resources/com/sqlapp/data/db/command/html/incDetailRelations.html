	@if{relations!=null||relations_logical!=null}
	<div id="Relations">
		<div class="tabs">
			<ul class="nav">
				@if{relations!=null}
				<li class="active default"><a href="#Compact" data-parent="Relations">Compact</a></li>
				@end{}
				@if{relations_logical!=null}
				<li><a href="#LogicalCompact" data-parent="Relations">Logical Compact</a></li>
				@end{}
			</ul>
		</div>
		<div class="tab-content">
			@if{relations!=null}
			<div id="Compact" data-default="true">
				<div class="diagram-container">
					<iframe class="diagram-frame" loading="lazy" src="../diagrams/@{objectFullPath(obj)}.@{_diagramExtension}" style="@{relations.iframeStyle}"></iframe>
				</div>
			</div>
			@end{}
			@if{relations_logical!=null}
			<div id="LogicalCompact">
				<div class="diagram-container">
					<iframe class="diagram-frame" loading="lazy" src="../diagrams/@{objectFullPath(obj)}_logical.@{_diagramExtension}" style="@{relations_logical.iframeStyle}"></iframe>
				</div>
			</div>
			@end{}
		</div>
	</div>
	@end{}
